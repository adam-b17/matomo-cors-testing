<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Target</title>
    <style>
      :root {
        --bg: #fff7ed;
        --text: #1c1917;
        --muted: #57534e;
        --border: #fed7aa;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #ffedd5 0%, var(--bg) 60%);
        color: var(--text);
      }

      .content {
        max-width: 820px;
        margin: 0 auto;
        padding: 28px 22px 40px;
      }

      h2 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .panel {
        margin-top: 18px;
        border: 1px dashed var(--border);
        border-radius: 12px;
        background: #ffffffc7;
        padding: 16px;
      }

      .code {
        margin: 0;
        white-space: pre-wrap;
        font-family: ui-monospace, Menlo, Consolas, Monaco, monospace;
        font-size: 0.85rem;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #ea580c;
        background: #f97316;
        color: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font: inherit;
      }

      .status {
        margin-top: 10px;
        border: 1px solid #fdba74;
        border-radius: 8px;
        padding: 10px;
        background: #fff;
        font-size: 0.9rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h2>Iframe Target Page</h2>
      <p>
        This page runs inside the iframe and tracks to Matomo using fetch instead of loading matomo.js.
      </p>
      <p>
        The request includes a custom header to force CORS preflight, making it easier to validate private-network preflight behavior.
      </p>

      <section class="panel">
        <pre class="code" id="payloadPreview">Preparing payload...</pre>
        <div class="actions">
          <button type="button" id="trackPageViewBtn">Track Page View (fetch)</button>
          <button type="button" id="optionsProbeBtn">Run OPTIONS Probe</button>
        </div>
        <div class="status" id="trackStatus">Idle</div>
      </section>
    </div>

    <script>
      const MATOMO_BASE = 'https://matomo/';
      const MATOMO_SITE_ID = '10';
      const payloadPreview = document.getElementById('payloadPreview');
      const trackStatus = document.getElementById('trackStatus');
      const trackPageViewBtn = document.getElementById('trackPageViewBtn');
      const optionsProbeBtn = document.getElementById('optionsProbeBtn');

      function buildPageViewPayload() {
        const params = new URLSearchParams();
        params.set('idsite', MATOMO_SITE_ID);
        params.set('rec', '1');
        params.set('apiv', '1');
        params.set('action_name', document.title || 'Iframe Target');
        params.set('url', window.location.href);
        params.set('rand', String(Date.now()));
        return params;
      }

      async function trackPageViewWithFetch() {
        const params = buildPageViewPayload();
        payloadPreview.textContent = params.toString();
        trackStatus.textContent = 'Sending fetch to ' + MATOMO_BASE + 'matomo.php ...';
        const startedAt = performance.now();

        try {
          const response = await fetch(MATOMO_BASE + 'matomo.php', {
            method: 'POST',
            mode: 'cors',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'X-Cors-Probe': 'matomo-fetch-tracker',
            },
            body: params.toString(),
          });

          const durationMs = Math.round(performance.now() - startedAt);
          trackStatus.textContent =
            'Fetch completed. HTTP status: ' + response.status + '\n' +
            'Elapsed: ' + durationMs + 'ms\n' +
            'Check DevTools Network for the OPTIONS preflight and private-network headers.';
        } catch (error) {
          const durationMs = Math.round(performance.now() - startedAt);
          trackStatus.textContent =
            'Fetch failed after ' + durationMs + 'ms.\n' +
            String(error) + '\n' +
            'Check DevTools Network and Console for CORS/PNA rejection details.';
        }
      }

      async function runOptionsProbe() {
        trackStatus.textContent = 'Sending OPTIONS probe to ' + MATOMO_BASE + 'matomo.php ...';
        const startedAt = performance.now();

        try {
          const response = await fetch(MATOMO_BASE + 'matomo.php', {
            method: 'OPTIONS',
            mode: 'cors',
            credentials: 'include',
            headers: {
              'X-Cors-Probe': 'matomo-options-probe',
            },
          });

          const durationMs = Math.round(performance.now() - startedAt);
          trackStatus.textContent =
            'OPTIONS completed. HTTP status: ' + response.status + '\n' +
            'Elapsed: ' + durationMs + 'ms\n' +
            'Use DevTools to confirm returned CORS/PNA headers on this OPTIONS response.';
        } catch (error) {
          const durationMs = Math.round(performance.now() - startedAt);
          trackStatus.textContent =
            'OPTIONS failed after ' + durationMs + 'ms.\n' +
            String(error) + '\n' +
            'Check DevTools Network and Console for CORS/PNA failure details.';
        }
      }

      trackPageViewBtn.addEventListener('click', trackPageViewWithFetch);
      optionsProbeBtn.addEventListener('click', runOptionsProbe);
      payloadPreview.textContent = buildPageViewPayload().toString();
      window.addEventListener('load', trackPageViewWithFetch);
    </script>
  </body>
</html>
