<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORS Test Host</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #dbe2ea;
        --accent: #0ea5e9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% 10%, #e0f2fe, transparent 45%),
          radial-gradient(circle at 85% 0%, #dcfce7, transparent 40%),
          var(--bg);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(960px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .frame-wrap {
        padding: 20px;
      }

      iframe {
        width: 100%;
        height: 560px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: #fff;
      }

      .tip {
        margin-top: 14px;
        font-size: 0.92rem;
      }

      .code {
        background: #f1f5f9;
        color: #0f172a;
        border: 1px solid #e2e8f0;
        padding: 2px 6px;
        border-radius: 6px;
      }

      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        margin-right: 7px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <header class="header">
          <h1><span class="dot"></span>Matomo Iframe Host Page</h1>
          <p>
            This page is intended to be deployed on Vercel and loads an iframe where Matomo will be integrated.
          </p>
        </header>

        <div class="frame-wrap">
          <iframe
            src="./iframe.html"
            title="Matomo iframe test page"
            loading="eager"
          ></iframe>
          <p class="tip">
            Change iframe source if needed. Current source:
            <span class="code">./iframe.html</span>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
